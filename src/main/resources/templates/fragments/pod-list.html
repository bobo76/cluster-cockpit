<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="page" id="pod-page"
     hx-get="/pods" hx-include="[name=namespace]"
     hx-trigger="cluster-changed from:body"
     hx-target="#pod-page"
     hx-swap="outerHTML">

    <div class="content-header">
        <h2>Pods</h2>
        <span class="count" th:if="${pods != null}">
            <span th:text="|${pods.size()} items|"></span>
            <span class="heartbeat" title="auto-refresh every 5s"></span>
        </span>
        <span class="spacer"></span>
        <button type="button" class="action-btn" id="pause-refresh-btn"
                onclick="toggleRefresh(this)">Pause</button>
        <label>
            Namespace <span class="kbd" title="Press / to focus namespace">/</span>
            <select name="namespace"
                    hx-get="/pods"
                    hx-include="this"
                    hx-target="#pod-page"
                    hx-swap="outerHTML"
                    hx-trigger="change">
                <option value="*" th:selected="${namespace == '*'}">— all namespaces —</option>
                <option th:each="ns : ${namespaces}"
                        th:value="${ns}"
                        th:text="${ns}"
                        th:selected="${ns == namespace}"></option>
            </select>
        </label>
    </div>

    <div id="pod-table"
         hx-get="/pods" hx-include="[name=namespace]"
         hx-target="#pod-table" hx-swap="morph:outerHTML"
         hx-select="#pod-table" hx-trigger="every 5s">
        <div th:replace="~{fragments/pod-list :: table}"></div>
    </div>
</div>

<div th:fragment="table" th:remove="tag">
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <table th:if="${pods != null}">
        <thead>
        <tr>
            <th></th>
            <th th:if="${namespace == '*'}">Namespace</th>
            <th>Name</th>
            <th>Ready</th>
            <th>Status</th>
            <th>Restarts</th>
            <th>Age</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pods}" th:id="|pod-${p.namespace()}-${p.name()}|">
            <td>
                <button type="button" class="action-btn icon"
                        title="Details"
                        th:attr="data-detail-url=|/pods/${p.namespace()}/${p.name()}/detail|"
                        onclick="openPodDetail(this.dataset.detailUrl)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
                         stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                         aria-hidden="true">
                        <circle cx="12" cy="12" r="9"/>
                        <line x1="12" y1="10" x2="12" y2="16"/>
                        <circle cx="12" cy="7.5" r="0.6" fill="currentColor"/>
                    </svg>
                </button>
            </td>
            <td th:if="${namespace == '*'}" th:text="${p.namespace()}"></td>
            <td th:text="${p.name()}"></td>
            <td th:text="${p.ready()}"></td>
            <td><span class="status-pill" th:classappend="${p.statusClass()}" th:text="${p.status()}"></span></td>
            <td th:text="${p.restarts()}"></td>
            <td th:text="${p.age()}"></td>
        </tr>
        <tr th:if="${pods != null and pods.isEmpty()}" class="empty-row">
            <td th:attr="colspan=${namespace == '*' ? 7 : 6}">— no pods in scope —</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
