<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="page" id="pod-page"
     hx-get="/pods" hx-include="[name=namespace]"
     hx-trigger="cluster-changed from:body"
     hx-target="#pod-page"
     hx-swap="outerHTML">

    <div class="content-header">
        <h2>Pods</h2>
        <span class="count" th:if="${pods != null}" th:text="|${pods.size()} items|"></span>
        <span class="spacer"></span>
        <button type="button" class="action-btn" id="pause-refresh-btn"
                onclick="togglePodRefresh(this)">Pause</button>
        <label>
            Namespace:
            <select name="namespace"
                    hx-get="/pods"
                    hx-include="this"
                    hx-target="#pod-page"
                    hx-swap="outerHTML"
                    hx-trigger="change">
                <option value="*" th:selected="${namespace == '*'}">— all namespaces —</option>
                <option th:each="ns : ${namespaces}"
                        th:value="${ns}"
                        th:text="${ns}"
                        th:selected="${ns == namespace}"></option>
            </select>
        </label>
    </div>

    <div id="pod-table"
         hx-get="/pods" hx-include="[name=namespace]"
         hx-target="#pod-table" hx-swap="outerHTML"
         hx-select="#pod-table" hx-trigger="every 5s">
        <div th:replace="~{fragments/pod-list :: table}"></div>
    </div>
</div>

<div th:fragment="table" th:remove="tag">
    <div th:if="${error}" class="error" th:text="${error}"></div>

    <table th:if="${pods != null}">
        <thead>
        <tr>
            <th></th>
            <th th:if="${namespace == '*'}">Namespace</th>
            <th>Name</th>
            <th>Ready</th>
            <th>Status</th>
            <th>Restarts</th>
            <th>Age</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="p : ${pods}">
            <td>
                <button type="button" class="action-btn"
                        title="Details"
                        th:attr="data-detail-url=|/pods/${p.namespace()}/${p.name()}/detail|"
                        onclick="openPodDetail(this.dataset.detailUrl)">ℹ</button>
            </td>
            <td th:if="${namespace == '*'}" th:text="${p.namespace()}"></td>
            <td th:text="${p.name()}"></td>
            <td th:text="${p.ready()}"></td>
            <td><span class="status-pill" th:classappend="${p.statusClass()}" th:text="${p.status()}"></span></td>
            <td th:text="${p.restarts()}"></td>
            <td th:text="${p.age()}"></td>
        </tr>
        <tr th:if="${pods != null and pods.isEmpty()}">
            <td th:attr="colspan=${namespace == '*' ? 7 : 6}" style="color: #666;">no pods</td>
        </tr>
        </tbody>
    </table>
</div>
</body>
</html>
